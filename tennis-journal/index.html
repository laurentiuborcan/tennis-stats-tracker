<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tennis Journal</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🎾</span>
        <span class="logo-text">Tennis Journal</span>
      </div>
      <span class="header-sub">Davis League 25/26</span>
    </div>
  </header>

  <div class="tabs-bar" id="tabsBar">
    <button class="tab-btn" data-view="my-league">Davis League (Me)</button>
    <button class="tab-btn" data-view="all-league">Davis League (All)</button>
    <button class="tab-btn" data-view="other">Other Matches</button>
  </div>

  <main class="main" id="app"></main>

  <script src="app.js"></script>
</body>
</html>

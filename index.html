<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennis Stats Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🎾</span>
        <span class="logo-text">Tennis Stats Tracker</span>
      </div>
      <span class="header-sub">ATP &amp; WTA Rankings</span>
    </div>
  </header>

  <main class="main">

    <!-- Tabs -->
    <div class="tabs-bar">
      <button class="tab-btn" data-tour="atp">ATP Rankings</button>
      <button class="tab-btn" data-tour="wta">WTA Rankings</button>
      <button class="tab-btn" data-tour="live">
        <span class="tab-live-pip" aria-hidden="true"></span>Live Matches
      </button>
    </div>

    <!-- Search (rankings only) -->
    <div class="search-wrap" id="searchWrap" style="display:none">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search by player name…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-clear" id="searchClear" title="Clear" aria-label="Clear search">&#x2715;</button>
    </div>

    <!-- Toolbar: status left, last-updated + refresh right -->
    <div class="toolbar" id="toolbar" style="display:none">
      <span class="status-text" id="statusBar"></span>
      <div class="toolbar-right">
        <span class="last-updated" id="lastUpdated"></span>
        <button class="btn-refresh" id="refreshBtn" title="Refresh data">
          <svg class="refresh-icon" viewBox="0 0 16 16" width="13" height="13" fill="currentColor">
            <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
            <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
          </svg>
          Refresh
        </button>
      </div>
    </div>

    <!-- Rankings table container -->
    <div class="table-wrap" id="tableWrap">

      <!-- Welcome (shown before any tab is clicked) -->
      <div class="welcome-state" id="welcomeState">
        <div class="welcome-icon">🎾</div>
        <h2 class="welcome-title">Tennis Stats Tracker</h2>
        <p class="welcome-desc">Select a tab above to load ATP rankings, WTA rankings, or live match scores.</p>
        <div class="welcome-tabs">
          <button class="welcome-tab-btn" data-tour="atp">ATP Rankings</button>
          <button class="welcome-tab-btn" data-tour="wta">WTA Rankings</button>
          <button class="welcome-tab-btn" data-tour="live">Live Matches</button>
        </div>
      </div>

      <!-- Loading -->
      <div class="loading" id="loadingState" style="display:none">
        <div class="spinner"></div>
        <span>Loading…</span>
      </div>

      <!-- Error -->
      <div class="error-state" id="errorState" style="display:none">
        <span class="error-icon" id="errorIcon">⚠️</span>
        <p id="errorMsg">Failed to load data.</p>
        <button class="btn-retry" id="retryBtn">Try Again</button>
      </div>

      <!-- Rankings table -->
      <table class="rankings-table" id="rankingsTable" style="display:none">
        <thead>
          <tr>
            <th class="col-rank">Rank</th>
            <th class="col-player">Player</th>
            <th class="col-country">Country</th>
            <th class="col-points">Points</th>
          </tr>
        </thead>
        <tbody id="rankingsBody"></tbody>
      </table>

      <!-- Empty search -->
      <div class="empty-search" id="emptySearch" style="display:none">
        <span>🔍</span>
        <p>No players match "<span id="emptyQuery"></span>"</p>
      </div>

    </div>

    <!-- Live Matches panel (outside table-wrap) -->
    <div id="livePanel" style="display:none"></div>

  </main>

  <footer class="footer">
    Data provided by <span class="footer-accent">TennisAPI</span> via RapidAPI
  </footer>

  <script src="app.js"></script>
</body>
</html>

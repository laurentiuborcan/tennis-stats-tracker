<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennis Stats Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🎾</span>
        <span class="logo-text">Tennis Stats Tracker</span>
      </div>
      <span class="header-sub">Live ATP &amp; WTA Rankings</span>
    </div>
  </header>

  <main class="main">

    <!-- Tabs -->
    <div class="tabs-bar">
      <button class="tab-btn active" data-tour="atp">ATP Rankings</button>
      <button class="tab-btn" data-tour="wta">WTA Rankings</button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search by player name…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-clear" id="searchClear" title="Clear search" aria-label="Clear search">&#x2715;</button>
    </div>

    <!-- Status bar -->
    <div class="status-bar" id="statusBar"></div>

    <!-- Table container -->
    <div class="table-wrap" id="tableWrap">
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <span>Loading rankings…</span>
      </div>

      <div class="error-state" id="errorState" style="display:none">
        <span class="error-icon">⚠️</span>
        <p id="errorMsg">Failed to load rankings.</p>
        <button class="btn-retry" id="retryBtn">Try Again</button>
      </div>

      <table class="rankings-table" id="rankingsTable" style="display:none">
        <thead>
          <tr>
            <th class="col-rank">Rank</th>
            <th class="col-player">Player</th>
            <th class="col-country">Country</th>
            <th class="col-points">Points</th>
          </tr>
        </thead>
        <tbody id="rankingsBody"></tbody>
      </table>

      <div class="empty-search" id="emptySearch" style="display:none">
        <span>🎾</span>
        <p>No players match "<span id="emptyQuery"></span>"</p>
      </div>
    </div>

  </main>

  <footer class="footer">
    Data provided by <span class="footer-accent">TennisAPI</span> via RapidAPI
  </footer>

  <!-- DEBUG: endpoint probe — remove when done -->
  <div id="debugProbe" style="margin:2rem auto;max-width:900px;padding:0 1rem 2rem;">
    <details open>
      <summary style="cursor:pointer;font-family:monospace;font-size:0.85rem;padding:0.5rem;background:#1e1e1e;color:#4ec9b0;border-radius:4px 4px 0 0;">
        DEBUG — TennisAPI endpoint probe results
      </summary>
      <div id="debugProbeBody" style="background:#1e1e1e;border-radius:0 0 4px 4px;padding:1rem;font-family:monospace;font-size:0.8rem;">
        <p style="color:#888;margin:0">Probing endpoints…</p>
      </div>
    </details>
  </div>

  <script src="app.js"></script>
</body>
</html>
